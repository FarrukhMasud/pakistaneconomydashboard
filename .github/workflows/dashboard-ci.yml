name: Dashboard CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to Azure Storage after checks pass
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  audit:
    name: Audit and build
    runs-on: ubuntu-latest
    env:
      AUDIT_SKIP_SOURCE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run data and build checks
        run: npm run ci:audit

  deploy:
    name: Deploy to Azure Storage
    needs: audit
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy }}
    permissions:
      contents: read
      id-token: write
    env:
      AUDIT_SKIP_SOURCE: '1'
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require Azure OIDC secrets
        shell: bash
        run: |
          test -n "$AZURE_CLIENT_ID"
          test -n "$AZURE_TENANT_ID"
          test -n "$AZURE_SUBSCRIPTION_ID"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy static website
        shell: pwsh
        run: npm run deploy
