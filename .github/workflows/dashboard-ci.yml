name: Dashboard CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Audit and build
    runs-on: ubuntu-latest
    env:
      AUDIT_SKIP_SOURCE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run data and build checks
        run: npm run ci:audit
