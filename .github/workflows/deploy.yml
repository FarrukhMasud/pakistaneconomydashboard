name: Build & Deploy to Azure Storage

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Azure Storage
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az storage blob upload-batch \
              --account-name pakeconomicdash \
              --destination '$web' \
              --source ./dist \
              --overwrite \
              --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              --output none
            echo "✅ Deployed to https://pakeconomicdash.z5.web.core.windows.net/"
